<div class="demo-panel">
    <div class="tabs">
        <button class="tab active" data-core="hacker">🔒 Security</button>
        <button class="tab" data-core="deepseek">🧮 Math</button>
        <button class="tab" data-core="claude">💬 Ethics</button>
    </div>
    <div class="demo-content" id="hacker-demo">
        <input type="text" placeholder="Enter target IP..." />
        <button onclick="generatePayload()">Generate Reverse Shell</button>
        <pre id="output"></pre>
    </div>
    <div class="demo-content hidden" id="deepseek-demo">
        <input type="text" placeholder="e.g. x^2 + 2x + 1" />
        <button onclick="solveMath()">Solve</button>
        <div id="math-output"></div>
    </div>
    <div class="demo-content hidden" id="claude-demo">
        <textarea placeholder="Describe a scenario..."></textarea>
        <button onclick="analyzeEthics()">Analyze</button>
        <div id="ethics-output"></div>
    </div>
</div>
